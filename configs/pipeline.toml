[reid]
outputs_root = "../outputs/mot17-11-sdp_experiments"
run_prefix = "reid"
output_video_name = "demo_reid.mp4"
log_every = 30
metrics_file_name = "metrics.json"

[reid.source]
type = "file"
uri = "../assets/mot17/mot17-11-sdp.avi"
reconnect = true
reconnect_delay_s = 3.0
reconnect_max_attempts = 5

[reid.output]
save_video = false
save_assignments = true

[reid.stop]
max_frames = ""
max_duration_s = ""

[reid.detector]
model_name = "yolo26n.pt"
weights_path = ""
conf = 0.45
classes = [0]

[reid.extractor]
model_name = "osnet_x1_0"
weights_path = ""
device = ""

[reid.gallery]
sim_threshold = 0.75
ema = 0.65
update_threshold = 0.80
max_ids = 1000
state_path = "../outputs/reid_gallery.json"
load_on_start = false
save_on_exit = true
autosave_interval_s = 60.0

[reid.tracker]
iou_threshold = 0.5
max_missed = 3
confirm_hits = 3
