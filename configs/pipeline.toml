[reid]
outputs_root = "outputs/funtional_tests"
run_prefix = "reid"
output_video_name = "demo_reid.mp4"
log_every = 30
metrics_file_name = "metrics.json"

[reid.source]
type = "file"
uri = "assets/mot17/mot17-05-sdp-001-207.avi"
reconnect = true
reconnect_delay_s = 3.0
reconnect_max_attempts = 5

[reid.output]
save_video = false
save_assignments = true

[reid.stop]
max_frames = ""
max_duration_s = ""

[reid.detector]
model_name = "yolo26n.pt"
weights_path = ""
conf = 0.11
classes = [0]

[reid.extractor]
model_name = "osnet_x1_0"
weights_path = ""
device = ""

[reid.gallery]
sim_threshold = 0.77
ema = 0.9
update_threshold = 0.81
max_ids = 1000
state_path = "outputs/reid_gallery.json"
load_on_start = false
save_on_exit = true
autosave_interval_s = 60.0

[reid.tracker]
iou_threshold = 0.4
max_missed = 5
confirm_hits = 3
