[reid]
outputs_root = "outputs"
run_prefix = "runs"
output_video_name = "demo_reid.avi"
log_every = 30
metrics_file_name = "metrics.json"

[reid.source]
type = "file"
uri = "assets/videos/test.mp4"
reconnect = true
reconnect_delay_s = 3.0
reconnect_max_attempts = 5

[reid.output]
save_video = true

[reid.stop]
max_frames = ""
max_duration_s = ""

[reid.detector]
model_name = "yolo26n.pt"
weights_path = "models/detectors/yolo26n.pt"
conf = 0.25
classes = [0]

[reid.extractor]
model_name = "osnet_x1_0"
weights_path = ""
device = ""

[reid.gallery]
sim_threshold = 0.55
ema = 0.8
update_threshold = 0.6
max_ids = 1000
state_path = "outputs/reid_gallery.json"
load_on_start = true
save_on_exit = true
autosave_interval_s = 60.0

[reid.tracker]
iou_threshold = 0.3
max_missed = 15
confirm_hits = 3
